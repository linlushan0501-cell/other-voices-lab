<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Other Voices Lab | 虛構他者獨白</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="hero">
        <h1 id="page-title">welcome</h1>
        <nav class="nav" id="nav" aria-label="主要步驟"></nav>
      </header>

      <section class="welcome-card" id="participant-step">
        <div class="welcome-form">
          <label>
            <span>目前參與者</span>
            <select id="participant-select"></select>
          </label>
          <label>
            <span>參與者 ID</span>
            <input id="participant-code" autocomplete="off" placeholder="P-001" />
          </label>
          <label>
            <span>日期</span>
            <input id="interview-date" inputmode="numeric" placeholder="年 / 月 / 日" />
          </label>
          <div class="participant-actions">
            <button class="secondary-button" id="add-participant" type="button">Add</button>
            <button class="secondary-button danger-button" id="delete-participant" type="button">Delete</button>
          </div>
          <button class="step-link" id="participant-next" type="button">Next</button>
        </div>
      </section>

      <section class="event-type-step hidden" id="event-type-step">
        <div class="center-heading">
          <h2>生命中的關鍵事件</h2>
          <p>請先從以下五個方向的問題，找出你曾經發生、正在經歷、或是即將尚未發生的關鍵事件</p>
        </div>
        <div class="event-type-list" id="event-type-list"></div>
        <div class="screen-actions">
          <button class="step-link" id="event-type-next" type="button">Next</button>
        </div>
      </section>

      <section class="hidden" id="event-step">
        <div class="tab-layout">
          <section class="event-panel">
            <h2>關鍵事件</h2>
            <label>
              <span>事件描述</span>
              <textarea id="real-event" placeholder="輸入關鍵事件"></textarea>
            </label>
            <div class="form-grid">
              <label>
                <span>偏移的過去</span>
                <input id="real-past-time" placeholder="例如：事件發生前一年" />
              </label>
              <label>
                <span>偏移的未來</span>
                <input id="real-future-time" placeholder="十年後" />
              </label>
            </div>
          </section>

          <section class="event-panel">
            <h2>反事實情境</h2>
            <label>
              <span>what if 情境描述</span>
              <textarea id="counterfactual-event" placeholder="輸入反事實情境，例如：如果當時沒有發生..."></textarea>
            </label>
            <div class="form-grid">
              <label>
                <span>偏移的過去</span>
                <input id="counterfactual-past-time" placeholder="例如：事件發生前一年" />
              </label>
              <label>
                <span>偏移的未來</span>
                <input id="counterfactual-future-time" placeholder="十年後" />
              </label>
            </div>
          </section>
        </div>
      </section>

      <section class="hidden" id="characters-step">
        <h2 class="section-title">他者角色</h2>
        <div class="character-list" id="character-list"></div>
        <div class="panel-actions">
          <button class="secondary-button" id="add-character" type="button">新增第三位角色</button>
        </div>
      </section>

      <section class="hidden" id="generate-step">
        <div class="generate-layout">
          <section class="generate-controls">
            <h2>單筆生成</h2>
            <label>
              <span>選擇他者</span>
              <select id="character-select"></select>
            </label>

            <div class="control-group">
              <span>條件</span>
              <div class="segmented" data-field="condition">
                <button class="active" data-value="real" type="button">真實</button>
                <button data-value="counterfactual" type="button">反事實</button>
              </div>
            </div>

            <div class="control-group">
              <span>時間</span>
              <div class="segmented" data-field="timePoint">
                <button data-value="past" type="button">過去</button>
                <button class="active" data-value="present" type="button">當下</button>
                <button data-value="future" type="button">未來</button>
              </div>
            </div>

            <button class="primary-button" id="generate-button" type="button">生成這一筆</button>
          </section>

          <section class="postcard" aria-live="polite">
            <div class="postcard-copy">
              <div class="postcard-top">
                <span id="postcard-status">示意</span>
                <span class="stamp">V3</span>
              </div>
              <h2 id="postcard-title">爸爸（示意）</h2>
              <span class="pill" id="postcard-meta">生理需求 / 真實 / 當下</span>
              <p id="postcard-body">【爸爸】我看到他把杯子握得很緊，明明只是幾句話，他卻像怕自己一開口就會撐不住。當下我沒有馬上問，因為我知道他一被追問，就會把話收回去。</p>
            </div>
            <div class="image-preview">
              <span>Image</span>
              <div></div>
            </div>
          </section>
        </div>

        <section class="progress-panel">
          <h2>生成紀錄</h2>
          <div class="matrix" id="progress-matrix"></div>
          <div class="record-list" id="record-list"></div>
        </section>
      </section>
    </main>

    <template id="character-template">
      <article class="character-card">
        <div class="card-title"></div>
        <label>
          <span>他者</span>
          <input data-field="name" placeholder="例如：爸爸" />
        </label>
        <label class="relationship-field">
          <span>關係</span>
          <input data-field="relationship" placeholder="例如：主要照顧者" />
        </label>
        <label>
          <span>選擇原因</span>
          <input data-field="selectionReason" placeholder="為什麼選這個角色" />
        </label>
      </article>
    </template>

    <script src="script.js"></script>
  </body>
</html>
